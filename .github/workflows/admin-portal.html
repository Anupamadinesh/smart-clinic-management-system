<!DOCTYPE html>
<html>
<head>
    <title>Smart Clinic - Admin Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            margin-top: 40px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 80%;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Admin Portal - Add Doctor</h2>

    <input type="text" id="doctorName" placeholder="Doctor Name">
    <input type="text" id="specialization" placeholder="Specialization">
    <button onclick="addDoctor()">Add Doctor</button>

    <h3>Doctor List</h3>

    <table>
        <thead>
            <tr>
                <th>Doctor Name</th>
                <th>Specialization</th>
            </tr>
        </thead>
        <tbody id="doctorTable"></tbody>
    </table>

</div>

<script>
function addDoctor() {
    const name = document.getElementById("doctorName").value;
    const specialization = document.getElementById("specialization").value;

    if (name === "" || specialization === "") {
        alert("Please fill all fields");
        return;
    }

    const table = document.getElementById("doctorTable");
    const row = table.insertRow();

    row.insertCell(0).innerText = name;
    row.insertCell(1).innerText = specialization;

    document.getElementById("doctorName").value = "";
    document.getElementById("specialization").value = "";
}
</script>

</body>
</html>
