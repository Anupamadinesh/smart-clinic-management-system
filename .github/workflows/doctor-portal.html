<!DOCTYPE html>
<html>
<head>
    <title>Doctor Portal</title>
    <style>
        body { font-family: Arial; text-align:center; margin-top:50px; }
        table { margin:auto; border-collapse: collapse; width:60%; }
        th, td { border:1px solid black; padding:10px; }
        th { background-color:#f2f2f2; }
    </style>
</head>
<body>

<h2>Doctor Portal - My Appointments</h2>

<table>
    <thead>
        <tr>
            <th>Patient Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Reason</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>John Doe</td>
            <td>2026-06-15</td>
            <td>10:00 AM</td>
            <td>Fever</td>
        </tr>
        <tr>
            <td>Mary Smith</td>
            <td>2026-06-15</td>
            <td>11:30 AM</td>
            <td>Checkup</td>
        </tr>
        <tr>
            <td>David Lee</td>
            <td>2026-06-16</td>
            <td>09:00 AM</td>
            <td>Headache</td>
        </tr>
    </tbody>
</table>

</body>
</html>
